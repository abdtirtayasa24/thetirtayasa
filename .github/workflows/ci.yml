name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Test frontend
        working-directory: frontend
        run: bun test
      - name: Lint frontend
        working-directory: frontend
        run: bun run lint
      - name: Build frontend
        working-directory: frontend
        run: bun run build

  backend:
    name: Backend checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e '.[dev]'
      - name: Test backend
        working-directory: backend
        run: |
          . .venv/bin/activate
          pytest
      - name: Lint backend
        working-directory: backend
        run: |
          . .venv/bin/activate
          ruff check .
