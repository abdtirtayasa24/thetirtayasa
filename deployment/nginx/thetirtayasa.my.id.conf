# Place limit_req_zone in the nginx http context. If this file is included from
# sites-enabled inside an existing http block, move this directive to nginx.conf.
limit_req_zone $binary_remote_addr zone=thetirtayasa_public:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name thetirtayasa.my.id www.thetirtayasa.my.id;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://thetirtayasa.my.id$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thetirtayasa.my.id;

    ssl_certificate /etc/letsencrypt/live/thetirtayasa.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thetirtayasa.my.id/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        limit_req zone=thetirtayasa_public burst=40 nodelay;
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
